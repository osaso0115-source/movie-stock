<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Movie Stock">
<meta name="theme-color" content="#080810">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Movie Stock</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080810;
  --s1:       #10101C;
  --s2:       #17172A;
  --s3:       #1F1F35;
  --gold:     #C8A96E;
  --gold2:    #8C6E3F;
  --white:    #EFEFEF;
  --mid:      #7070A0;
  --dim:      #40405A;
  --red:      #9B3A3A;
  --st: env(safe-area-inset-top);
  --sb: env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column}

/* ── TABS ── */
.tab-bar{
  flex-shrink:0;
  display:flex;
  background:rgba(8,8,16,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border-top:1px solid rgba(200,169,110,0.12);
  padding:0 0 calc(var(--sb)) 0;
  order:2;
}
.tab-btn{
  flex:1;padding:10px 0 8px;
  background:none;border:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;
  color:var(--mid);
  font-family:'DM Sans',sans-serif;
  font-size:10px;letter-spacing:0.06em;text-transform:uppercase;
  transition:color 0.15s;
}
.tab-btn.active{color:var(--gold)}
.tab-icon{font-size:20px;line-height:1}

/* ── VIEWS ── */
.views{flex:1;order:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;display:none}
.view.active{display:block}
.view::-webkit-scrollbar{display:none}

/* ── HEADER ── */
.app-header{
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,16,0.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,0.1);
  padding:calc(var(--st) + 14px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:20px;letter-spacing:0.04em;color:var(--white);
}
.logo em{color:var(--gold);font-style:normal}
.btn-add{
  width:34px;height:34px;border-radius:8px;
  background:var(--gold);color:var(--bg);
  border:none;font-size:20px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity 0.15s;
}
.btn-add:active{opacity:0.75}

/* ── STATS ── */
.stats-row{
  display:flex;gap:8px;padding:16px 20px 8px;
}
.stat-box{
  flex:1;background:var(--s1);border:1px solid rgba(255,255,255,0.05);
  border-radius:10px;padding:12px 10px;text-align:center;
}
.stat-n{font-family:'DM Serif Display',serif;font-size:24px;color:var(--gold);line-height:1}
.stat-l{font-size:10px;color:var(--mid);margin-top:3px;letter-spacing:0.07em;text-transform:uppercase}

/* ── SORT BAR ── */
.sort-bar{
  display:flex;gap:6px;padding:4px 20px 14px;
  overflow-x:auto;scrollbar-width:none;
}
.sort-bar::-webkit-scrollbar{display:none}
.sort-chip{
  white-space:nowrap;font-size:12px;font-family:'DM Sans',sans-serif;
  padding:5px 13px;border-radius:6px;
  border:1px solid var(--dim);background:transparent;
  color:var(--mid);cursor:pointer;transition:all 0.15s;
}
.sort-chip.active{background:var(--s3);border-color:var(--gold2);color:var(--white)}

/* ── MOVIE LIST ── */
.movie-list{display:flex;flex-direction:column;gap:1px;padding:0 0 20px}

.movie-card{
  background:var(--s1);
  border-bottom:1px solid rgba(255,255,255,0.04);
  padding:16px 20px;
  cursor:pointer;
  transition:background 0.12s;
  display:flex;align-items:center;gap:14px;
}
.movie-card:first-child{border-top:1px solid rgba(255,255,255,0.04)}
.movie-card:active{background:var(--s2)}

.card-date-col{
  flex-shrink:0;width:36px;
  text-align:center;
}
.card-day{font-family:'DM Serif Display',serif;font-size:22px;color:var(--gold);line-height:1}
.card-mon{font-size:10px;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-top:1px}

.card-divider{width:1px;height:40px;background:var(--dim);flex-shrink:0}

.card-body{flex:1;min-width:0}
.card-title{
  font-family:'DM Serif Display',serif;
  font-size:16px;color:var(--white);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-year{font-size:11px;color:var(--mid);margin-top:2px}
.card-snippet{
  font-size:12px;color:var(--mid);margin-top:5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.card-score-col{flex-shrink:0;text-align:right}
.score-ring{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:1.5px solid var(--gold2);
  font-family:'DM Serif Display',serif;
  font-size:16px;color:var(--gold);
}
.score-ring.empty{border-color:var(--dim);color:var(--dim);font-size:13px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:70px 30px}
.empty-icon{font-size:44px;opacity:0.25;margin-bottom:14px}
.empty-t{font-family:'DM Serif Display',serif;font-size:20px;color:var(--mid);margin-bottom:6px}
.empty-s{font-size:13px;color:var(--dim)}

/* ── CALENDAR VIEW ── */
.cal-header{
  padding:calc(var(--st) + 14px) 20px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,8,16,0.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(200,169,110,0.1);
  position:sticky;top:0;z-index:50;
}
.cal-month{font-family:'DM Serif Display',serif;font-size:20px;color:var(--white)}
.cal-nav{display:flex;gap:4px}
.cal-nav-btn{
  width:32px;height:32px;border-radius:7px;
  background:var(--s2);border:1px solid var(--dim);
  color:var(--mid);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;
}
.cal-nav-btn:active{background:var(--s3);color:var(--white)}

.cal-grid-wrap{padding:16px 20px 0}
.cal-dow{
  display:grid;grid-template-columns:repeat(7,1fr);
  margin-bottom:6px;
}
.cal-dow-cell{
  text-align:center;font-size:10px;letter-spacing:0.07em;
  text-transform:uppercase;color:var(--dim);padding:4px 0;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{
  aspect-ratio:1;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;cursor:default;
}
.cal-cell.has-movie{cursor:pointer;background:var(--s2)}
.cal-cell.has-movie:active{background:var(--s3)}
.cal-cell.today .cal-num{
  background:var(--gold);color:var(--bg);
  border-radius:50%;width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
}
.cal-num{font-size:13px;color:var(--mid);line-height:1}
.cal-cell.has-movie .cal-num{color:var(--white)}
.cal-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gold);margin-top:2px;
  opacity:0.85;
}
.cal-dot-multi{
  display:flex;gap:2px;margin-top:2px;
}
.cal-dot-s{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0.7}

.cal-day-list{padding:16px 20px 80px}
.cal-day-title{
  font-size:11px;letter-spacing:0.08em;text-transform:uppercase;
  color:var(--mid);margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--dim);
}
.cal-movie-item{
  padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);
  cursor:pointer;display:flex;align-items:center;gap:12px;
}
.cal-movie-item:active{opacity:0.7}
.cal-item-title{font-family:'DM Serif Display',serif;font-size:16px;flex:1}
.cal-item-score{
  font-size:13px;color:var(--gold);
  font-family:'DM Serif Display',serif;
}

/* ── MODAL ── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity 0.22s;
}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  width:100%;background:var(--s2);
  border-radius:20px 20px 0 0;
  border-top:1px solid rgba(200,169,110,0.15);
  padding-bottom:calc(var(--sb) + 12px);
  max-height:93dvh;overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.overlay.open .sheet{transform:translateY(0)}
.sheet::-webkit-scrollbar{display:none}
.sheet-handle{
  width:32px;height:3px;background:var(--dim);
  border-radius:2px;margin:12px auto 0;
}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 0;
}
.sheet-title{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold)}
.btn-x{
  width:30px;height:30px;border-radius:6px;
  background:var(--s3);border:none;color:var(--mid);
  font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* ── FORM ── */
.form-body{padding:20px 20px 0;display:flex;flex-direction:column;gap:18px}
.field-lbl{
  font-size:10px;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--mid);margin-bottom:7px;
}
.field-in{
  width:100%;background:var(--s1);
  border:1px solid var(--dim);border-radius:9px;
  color:var(--white);font-family:'DM Sans',sans-serif;font-size:15px;
  padding:11px 13px;outline:none;
  -webkit-appearance:none;
  transition:border-color 0.15s;
}
.field-in:focus{border-color:var(--gold)}
.field-in::placeholder{color:var(--dim)}
textarea.field-in{min-height:90px;resize:none;line-height:1.6}

/* ── SCORE DOTS (replaces stars) ── */
.rating-block{display:flex;flex-direction:column;gap:13px}
.rating-row2{display:flex;align-items:center;justify-content:space-between}
.rating-lbl{font-size:13px;color:var(--white);min-width:90px}
.dot-row{display:flex;gap:6px;align-items:center}
.dot-btn{
  width:28px;height:28px;border-radius:6px;
  background:var(--s1);border:1px solid var(--dim);
  color:var(--mid);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.12s;font-family:'DM Sans',sans-serif;
}
.dot-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg)}

/* ── SAVE BTN ── */
.btn-save{
  display:block;margin:20px 20px 0;width:calc(100% - 40px);
  padding:15px;border-radius:11px;
  background:var(--gold);color:var(--bg);
  border:none;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;
  transition:opacity 0.15s;
}
.btn-save:active{opacity:0.8}

/* ── DETAIL ── */
.detail-hero{padding:22px 20px 6px}
.detail-t{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.2}
.detail-sub{font-size:12px;color:var(--mid);margin-top:4px}
.detail-scores{
  margin:16px 20px 0;padding:14px;
  background:var(--s1);border:1px solid rgba(200,169,110,0.1);
  border-radius:12px;display:flex;flex-direction:column;gap:10px;
}
.detail-score-row{display:flex;align-items:center;justify-content:space-between}
.detail-sl{font-size:13px;color:var(--mid)}
.detail-bar-wrap{display:flex;align-items:center;gap:8px}
.detail-bar-bg{
  width:80px;height:4px;border-radius:2px;background:var(--s3);position:relative;
}
.detail-bar-fill{
  position:absolute;top:0;left:0;height:100%;border-radius:2px;background:var(--gold);
  transition:width 0.4s cubic-bezier(0.25,1,0.5,1);
}
.detail-sv{font-size:13px;color:var(--gold);font-family:'DM Serif Display',serif;min-width:14px;text-align:right}
.detail-comment{
  margin:14px 20px 0;padding:14px;
  background:var(--s1);border:1px solid rgba(255,255,255,0.05);
  border-radius:12px;font-size:14px;color:var(--white);line-height:1.7;
}
.detail-date-row{font-size:12px;color:var(--mid);padding:12px 20px 0}
.detail-actions{display:flex;gap:8px;padding:16px 20px}
.btn-edit2{
  flex:1;padding:13px;border-radius:10px;
  background:var(--gold);color:var(--bg);border:none;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;
}
.btn-del2{
  width:46px;border-radius:10px;
  background:rgba(155,58,58,0.15);border:1px solid rgba(155,58,58,0.35);
  color:#C07070;font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:calc(var(--sb) + 70px);left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--s3);border:1px solid rgba(200,169,110,0.2);
  color:var(--white);font-size:13px;font-weight:500;
  padding:9px 18px;border-radius:8px;
  z-index:999;opacity:0;transition:all 0.2s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="views">
  <!-- LIST VIEW -->
  <div class="view active" id="viewList">
    <header class="app-header">
      <div class="logo">Movie <em>Stock</em></div>
      <button class="btn-add" id="btnAdd">＋</button>
    </header>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="sTotal">0</div><div class="stat-l">本</div></div>
      <div class="stat-box"><div class="stat-n" id="sAvg">—</div><div class="stat-l">平均</div></div>
      <div class="stat-box"><div class="stat-n" id="sMonth">0</div><div class="stat-l">今月</div></div>
    </div>
    <div class="sort-bar">
      <button class="sort-chip active" data-sort="watched">鑑賞日順</button>
      <button class="sort-chip" data-sort="added">登録順</button>
      <button class="sort-chip" data-sort="score">評価順</button>
    </div>
    <div class="movie-list" id="movieList"></div>
  </div>

  <!-- CALENDAR VIEW -->
  <div class="view" id="viewCal">
    <header class="cal-header">
      <div class="cal-month" id="calMonthLabel"></div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <button class="cal-nav-btn" id="calNext">›</button>
      </div>
    </header>
    <div class="cal-grid-wrap">
      <div class="cal-dow">
        <div class="cal-dow-cell">日</div><div class="cal-dow-cell">月</div>
        <div class="cal-dow-cell">火</div><div class="cal-dow-cell">水</div>
        <div class="cal-dow-cell">木</div><div class="cal-dow-cell">金</div>
        <div class="cal-dow-cell">土</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="cal-day-list" id="calDayList"></div>
  </div>
</div>

<!-- Tab Bar -->
<nav class="tab-bar">
  <button class="tab-btn active" data-view="viewList">
    <span class="tab-icon">▤</span>リスト
  </button>
  <button class="tab-btn" data-view="viewCal">
    <span class="tab-icon">⊟</span>カレンダー
  </button>
</nav>

<!-- Form Modal -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="formTitle">New entry</div>
      <button class="btn-x" id="btnCloseForm">✕</button>
    </div>
    <div class="form-body">
      <input type="hidden" id="editId">
      <div>
        <div class="field-lbl">Title</div>
        <input class="field-in" id="fTitle" type="text" placeholder="映画のタイトル">
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <div class="field-lbl">公開年</div>
          <button type="button" class="field-in year-picker-btn" id="fYearBtn" style="text-align:left;cursor:pointer;display:flex;align-items:center;justify-content:space-between">
            <span id="fYearDisplay" style="color:var(--dim)">選択</span>
            <span style="color:var(--mid);font-size:12px">▾</span>
          </button>
          <input type="hidden" id="fYear">
        </div>
        <div style="flex:1">
          <div class="field-lbl">鑑賞日</div>
          <input class="field-in" id="fWatched" type="date">
        </div>
      </div>
      <div>
        <div class="field-lbl">評価</div>
        <div class="rating-block" id="ratingBlock"></div>
      </div>
      <div>
        <div class="field-lbl">感想・メモ</div>
        <textarea class="field-in" id="fComment" placeholder="印象に残ったシーン、感想など"></textarea>
      </div>
    </div>
    <button class="btn-save" id="btnSave">保存する</button>
    <div style="height:8px"></div>
  </div>
</div>

<!-- Detail Modal -->
<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <div class="sheet-title" id="detailHeadTitle"></div>
      <button class="btn-x" id="btnCloseDetail">✕</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'moviestock_v2';
let movies = [];
let ratings = {story:0,visual:0,music:0,cast:0,overall:0};
let sortMode = 'watched';
let calYear, calMonth, calSelectedDate = null;

const FIELDS = [
  {k:'story',  l:'ストーリー'},
  {k:'visual', l:'映像・演出'},
  {k:'music',  l:'音楽'},
  {k:'cast',   l:'キャスト・演技'},
  {k:'overall',l:'総合評価'},
];

function load(){try{movies=JSON.parse(localStorage.getItem(KEY))||[];}catch{movies=[]}}
function save(){localStorage.setItem(KEY,JSON.stringify(movies))}

// ── DOT RATING ──
function buildRatingBlock(){
  const block = document.getElementById('ratingBlock');
  block.innerHTML = '';
  FIELDS.forEach(f=>{
    const row = document.createElement('div');
    row.className='rating-row2';
    const lbl=document.createElement('div');
    lbl.className='rating-lbl';lbl.textContent=f.l;
    const dots=document.createElement('div');dots.className='dot-row';
    for(let i=1;i<=5;i++){
      const b=document.createElement('button');
      b.type='button';b.className='dot-btn';b.textContent=i;b.dataset.val=i;b.dataset.field=f.k;
      b.onclick=()=>{ratings[f.k]=i;refreshDots()};
      dots.appendChild(b);
    }
    row.appendChild(lbl);row.appendChild(dots);block.appendChild(row);
  });
  refreshDots();
}
function refreshDots(){
  document.querySelectorAll('.dot-btn').forEach(b=>{
    b.classList.toggle('active', parseInt(b.dataset.val)<=ratings[b.dataset.field]);
  });
}

// ── LIST ──
function sortedMovies(){
  const a=[...movies];
  if(sortMode==='watched') return a.sort((x,y)=>(y.watched||y.createdAt)-(x.watched||x.createdAt));
  if(sortMode==='added')   return a.sort((x,y)=>y.createdAt-x.createdAt);
  if(sortMode==='score')   return a.sort((x,y)=>(y.ratings.overall||0)-(x.ratings.overall||0));
  return a;
}
function fmtDate(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return d.toLocaleDateString('ja-JP',{month:'short',day:'numeric'});
}
function fmtDateFull(ts){
  if(!ts) return '';
  const d=new Date(ts);
  return d.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
}
function renderList(){
  // stats
  document.getElementById('sTotal').textContent=movies.length;
  const sc=movies.map(m=>m.ratings.overall).filter(Boolean);
  document.getElementById('sAvg').textContent=sc.length?(sc.reduce((a,b)=>a+b,0)/sc.length).toFixed(1):'—';
  const now=new Date();
  document.getElementById('sMonth').textContent=movies.filter(m=>{
    const d=new Date(m.watched||m.createdAt);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  }).length;

  const list=document.getElementById('movieList');
  const s=sortedMovies();
  if(!s.length){
    list.innerHTML='<div class="empty"><div class="empty-icon">🎬</div><div class="empty-t">No movies yet</div><div class="empty-s">＋ボタンから記録を始めましょう</div></div>';
    return;
  }
  list.innerHTML=s.map(m=>{
    const d = m.watched ? new Date(m.watched) : null;
    const dayNum = d ? d.getDate() : '';
    const monStr = d ? d.toLocaleDateString('ja-JP',{month:'short'}).replace('月','') : '';
    const sc = m.ratings.overall;
    const scoreEl = sc
      ? `<div class="score-ring">${sc}</div>`
      : `<div class="score-ring empty">—</div>`;
    return `<div class="movie-card" data-id="${m.id}">
      <div class="card-date-col">
        <div class="card-day">${dayNum}</div>
        <div class="card-mon">${monStr}</div>
      </div>
      <div class="card-divider"></div>
      <div class="card-body">
        <div class="card-title">${esc(m.title)}</div>
        ${m.year?`<div class="card-year">${esc(m.year)}</div>`:''}
        ${m.comment?`<div class="card-snippet">${esc(m.comment)}</div>`:''}
      </div>
      <div class="card-score-col">${scoreEl}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.movie-card').forEach(c=>{
    c.onclick=()=>openDetail(c.dataset.id);
  });
}

// ── CALENDAR ──
function initCal(){
  const now=new Date();
  calYear=now.getFullYear();calMonth=now.getMonth();
  renderCal();
}
function renderCal(){
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonthLabel').textContent=`${monthNames[calMonth]} ${calYear}`;

  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date();

  // Build date→movies map
  const dateMap={};
  movies.forEach(m=>{
    if(!m.watched) return;
    const d=new Date(m.watched);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      const k=d.getDate();
      if(!dateMap[k]) dateMap[k]=[];
      dateMap[k].push(m);
    }
  });

  const grid=document.getElementById('calGrid');
  grid.innerHTML='';

  // Empty cells
  for(let i=0;i<firstDay;i++){
    const cell=document.createElement('div');cell.className='cal-cell';grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');cell.className='cal-cell';
    const isToday=today.getDate()===d&&today.getMonth()===calMonth&&today.getFullYear()===calYear;
    if(isToday) cell.classList.add('today');
    const ms=dateMap[d];
    const numDiv=document.createElement('div');numDiv.className='cal-num';numDiv.textContent=d;
    cell.appendChild(numDiv);
    if(ms&&ms.length){
      cell.classList.add('has-movie');
      if(ms.length===1){
        const dot=document.createElement('div');dot.className='cal-dot';cell.appendChild(dot);
      } else {
        const dotRow=document.createElement('div');dotRow.className='cal-dot-multi';
        const cnt=Math.min(ms.length,3);
        for(let i=0;i<cnt;i++){const ds=document.createElement('div');ds.className='cal-dot-s';dotRow.appendChild(ds);}
        cell.appendChild(dotRow);
      }
      cell.onclick=()=>showCalDay(d,ms);
    }
    grid.appendChild(cell);
  }

  // Render day list for selected date or all movies this month
  renderCalDayList(calSelectedDate, dateMap);
}
function renderCalDayList(selectedDay, dateMap){
  const dl=document.getElementById('calDayList');
  let entries;
  if(selectedDay&&dateMap&&dateMap[selectedDay]){
    const d=new Date(calYear,calMonth,selectedDay);
    const label=d.toLocaleDateString('ja-JP',{month:'long',day:'numeric'});
    dl.innerHTML=`<div class="cal-day-title">${label}</div>`;
    entries=dateMap[selectedDay];
  } else {
    // Show all this month
    const allThisMonth=movies.filter(m=>{
      if(!m.watched) return false;
      const d=new Date(m.watched);
      return d.getFullYear()===calYear&&d.getMonth()===calMonth;
    }).sort((a,b)=>new Date(a.watched)-new Date(b.watched));
    if(!allThisMonth.length){
      dl.innerHTML='<div class="empty"><div class="empty-icon" style="font-size:28px;margin-bottom:8px">📅</div><div class="empty-s">この月の記録はありません</div></div>';
      return;
    }
    const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    dl.innerHTML=`<div class="cal-day-title">${monthNames[calMonth]} ${calYear} — ${allThisMonth.length}本</div>`;
    entries=allThisMonth;
  }
  entries.forEach(m=>{
    const item=document.createElement('div');item.className='cal-movie-item';
    item.innerHTML=`<div class="cal-item-title">${esc(m.title)}</div>${m.ratings.overall?`<div class="cal-item-score">${m.ratings.overall}</div>`:''}`;
    item.onclick=()=>openDetail(m.id);
    dl.appendChild(item);
  });
}
function showCalDay(day,ms){
  calSelectedDate=day;
  const dateMap={};
  movies.forEach(m=>{
    if(!m.watched) return;
    const d=new Date(m.watched);
    if(d.getFullYear()===calYear&&d.getMonth()===calMonth){
      const k=d.getDate();if(!dateMap[k]) dateMap[k]=[];dateMap[k].push(m);
    }
  });
  renderCalDayList(day,dateMap);
}

document.getElementById('calPrev').onclick=()=>{
  calSelectedDate=null;
  calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCal();
};
document.getElementById('calNext').onclick=()=>{
  calSelectedDate=null;
  calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCal();
};

// ── TABS ──
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('active');
    const v=document.getElementById(btn.dataset.view);
    v.classList.add('active');
    if(btn.dataset.view==='viewCal') renderCal();
  };
});

// ── SORT ──
document.querySelectorAll('.sort-chip').forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll('.sort-chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');sortMode=c.dataset.sort;renderList();
  };
});

// ── ADD / EDIT ──
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function openAdd(){
  document.getElementById('editId').value='';
  document.getElementById('formTitle').textContent='New entry';
  document.getElementById('fTitle').value='';
  document.getElementById('fYear').value='';
  document.getElementById('fWatched').value=todayStr();
  document.getElementById('fComment').value='';
  ratings={story:0,visual:0,music:0,cast:0,overall:0};
  buildRatingBlock();
  openModal('formOverlay');
  setTimeout(()=>document.getElementById('fTitle').focus(),320);
}
function openEdit(id){
  const m=movies.find(x=>x.id===id);if(!m) return;
  document.getElementById('editId').value=id;
  document.getElementById('formTitle').textContent='Edit entry';
  document.getElementById('fTitle').value=m.title;
  document.getElementById('fYear').value=m.year||'';
  document.getElementById('fComment').value=m.comment||'';
  if(m.watched){
    const d=new Date(m.watched);
    document.getElementById('fWatched').value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  } else {
    document.getElementById('fWatched').value=todayStr();
  }
  ratings={...m.ratings};
  buildRatingBlock();
  openModal('formOverlay');
}
document.getElementById('btnSave').onclick=()=>{
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('タイトルを入力してください');return;}
  const watchedVal=document.getElementById('fWatched').value;
  const watchedTs=watchedVal?new Date(watchedVal).getTime():null;
  const id=document.getElementById('editId').value;
  if(id){
    const idx=movies.findIndex(x=>x.id===id);
    if(idx!==-1){
      movies[idx]={...movies[idx],title,year:document.getElementById('fYear').value.trim(),comment:document.getElementById('fComment').value.trim(),ratings:{...ratings},watched:watchedTs};
      showToast('更新しました');
    }
  } else {
    movies.push({id:Date.now().toString(),title,year:document.getElementById('fYear').value.trim(),comment:document.getElementById('fComment').value.trim(),ratings:{...ratings},watched:watchedTs,createdAt:Date.now()});
    showToast('記録しました');
  }
  save();renderList();closeModal('formOverlay');
};

// ── DETAIL ──
function openDetail(id){
  const m=movies.find(x=>x.id===id);if(!m) return;
  document.getElementById('detailHeadTitle').textContent=m.year||'';
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-hero">
      <div class="detail-t">${esc(m.title)}</div>
      <div class="detail-sub">${m.watched?'鑑賞日 '+fmtDateFull(m.watched):''}</div>
    </div>
    <div class="detail-scores">
      ${FIELDS.map(f=>`
        <div class="detail-score-row">
          <div class="detail-sl">${f.l}</div>
          <div class="detail-bar-wrap">
            <div class="detail-bar-bg"><div class="detail-bar-fill" style="width:${((m.ratings[f.k]||0)/5)*100}%"></div></div>
            <div class="detail-sv">${m.ratings[f.k]||'—'}</div>
          </div>
        </div>`).join('')}
    </div>
    ${m.comment?`<div class="detail-comment">${esc(m.comment).replace(/\n/g,'<br>')}</div>`:''}
    <div class="detail-actions">
      <button class="btn-edit2" id="dBtnEdit">編集する</button>
      <button class="btn-del2" id="dBtnDel">🗑</button>
    </div>`;
  openModal('detailOverlay');
  document.getElementById('dBtnEdit').onclick=()=>{closeModal('detailOverlay');openEdit(id)};
  document.getElementById('dBtnDel').onclick=()=>{
    if(confirm(`「${m.title}」を削除しますか？`)){
      movies=movies.filter(x=>x.id!==id);save();renderList();
      closeModal('detailOverlay');showToast('削除しました');
    }
  };
}

// ── MODALS ──
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}

document.getElementById('btnAdd').onclick=openAdd;
document.getElementById('btnCloseForm').onclick=()=>closeModal('formOverlay');
document.getElementById('btnCloseDetail').onclick=()=>closeModal('detailOverlay');
['formOverlay','detailOverlay'].forEach(id=>{
  document.getElementById(id).onclick=e=>{if(e.target===e.currentTarget)closeModal(id)};
});

// ── TOAST ──
let tt;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── INIT ──
load();buildRatingBlock();renderList();initCal();
</script>
